<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Games Cloud | Access Granted</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --neon: #00ff41; --pink: #ff00ff; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        /* Хедер системы */
        header { border-bottom: 2px solid var(--neon); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); box-shadow: 0 0 15px var(--neon); position: sticky; top: 0; z-index: 100; }
        .search-input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 7px 15px; border-radius: 20px; outline: none; width: 200px; font-family: inherit; }

        /* Центр авторизации */
        .auth-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 85vh; }
        .neon-card { border: 2px solid var(--neon); padding: 40px; border-radius: 15px; box-shadow: 0 0 25px var(--neon); text-align: center; width: 320px; background: #000; }
        
        /* Розовый прогресс-бар */
        .progress-box { width: 100%; height: 10px; background: #111; margin: 25px 0; border-radius: 5px; display: none; border: 1px solid #333; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--pink); box-shadow: 0 0 15px var(--pink); transition: 0.3s; }

        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin: 10px 0; width: 90%; font-family: inherit; }
        button { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        button:hover { box-shadow: 0 0 30px var(--neon); transform: scale(1.02); }

        /* Игровое меню (скрыто) */
        #dashboard { display: none; padding: 40px; grid-template-columns: repeat(2, 1fr); gap: 25px; max-width: 800px; margin: 0 auto; animation: glitchOpen 0.5s ease-out; }
        .menu-item { border: 1px solid var(--pink); padding: 30px; text-align: center; background: #0a0a0a; box-shadow: 0 0 10px var(--pink); cursor: pointer; transition: 0.3s; }
        .menu-item:hover { background: var(--pink); color: #000; box-shadow: 0 0 30px var(--pink); }

        @keyframes glitchOpen { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div style="font-size: 22px; text-shadow: 0 0 10px var(--neon); font-weight: bold;">NEON_CLOUD_OS</div>
    <input type="text" class="search-input" placeholder="ПОИСК ИГР...">
</header>

<div class="auth-wrapper" id="login-screen">
    <div class="neon-card">
        <h2 style="color: var(--pink); text-shadow: 0 0 10px var(--pink); margin-top: 0;">USER_AUTH</h2>
        <input type="email" id="user-email" placeholder="LOGIN (xzemp415)">
        <input type="password" id="user-pass" placeholder="PASSWORD">
        
        <button onclick="startLoading()">ПОДКЛЮЧИТЬСЯ</button>

        <div class="progress-box" id="p-box"><div class="progress-fill" id="p-fill"></div></div>

        <div id="otp-input-block" style="display:none; margin-top: 20px;">
            <p style="font-size: 11px;">Код отправлен на imaf91824@gmail.com</p>
            <input type="text" id="otp-code-input" placeholder="ВВЕДИТЕ OTP КОД">
            <button onclick="checkOTP()">ВОЙТИ В СИСТЕМУ</button>
        </div>
    </div>
</div>

<div id="dashboard">
    <div class="menu-item">🕹️ МОИ ИГРЫ</div>
    <div class="menu-item">💾 ОБЛАКО</div>
    <div class="menu-item">🔧 КОНФИГ</div>
    <div class="menu-item">👤 ПРОФИЛЬ</div>
</div>

<script>
    // ТВОИ ДАННЫЕ ВШИТЫ
    emailjs.init("Hc1ftl7BXEdTvGHuj"); 

    let generatedOTP = 0;

    function startLoading() {
        const fill = document.getElementById('p-fill');
        document.getElementById('p-box').style.display = 'block';
        let val = 0;
        
        let loader = setInterval(() => {
            val += 20;
            fill.style.width = val + '%';
            if(val >= 100) {
                clearInterval(loader);
                dispatchEmail();
            }
        }, 150);
    }

    function dispatchEmail() {
        generatedOTP = Math.floor(10000 + Math.random() * 90000); 
        
        emailjs.send('service_uwitfbm', 'template_3gc2y7j', {
            to_email: 'imaf91824@gmail.com',
            code: generatedOTP
        }).then(() => {
            alert("🔒 СИСТЕМА: Код сгенерирован и отправлен!");
            document.getElementById('otp-input-block').style.display = 'block';
            document.getElementById('p-box').style.display = 'none';
        });
    }

    function checkOTP() {
        const inputVal = document.getElementById('otp-code-input').value;
        if(inputVal == generatedOTP) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
            alert("✅ ДОСТУП РАЗРЕШЕН. Добро пожаловать, XZEMP415.");
        } else {
            alert("⚠️ ОШИБКА ДОСТУПА: Код не совпадает!");
        }
    }
</script>

</body>
</html>
