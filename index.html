<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NEON CLOUD 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00ff41; --pink: #ff00ff; --cyan: #00f3ff; }
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: var(--neon); 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Поисковая панель и Хедер */
        header { 
            padding: 15px; background: rgba(0,0,0,0.8); 
            border-bottom: 1px solid var(--neon); 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            backdrop-filter: blur(10px); sticky; top: 0; z-index: 100;
        }
        .search-box {
            background: rgba(0,255,65,0.1); border: 1px solid var(--neon);
            border-radius: 20px; padding: 8px 15px; color: var(--neon);
            width: 80%; outline: none; font-family: inherit; text-align: center;
        }

        /* Контейнер Авторизации */
        .main-auth { height: 70vh; display: flex; align-items: center; justify-content: center; }
        .glass-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0,255,65,0.3);
            border-radius: 20px; padding: 30px; width: 85%; max-width: 350px;
            backdrop-filter: blur(15px); box-shadow: 0 0 30px rgba(0,255,65,0.2);
            text-align: center;
        }

        /* Инпуты */
        input[type="email"], input[type="password"], input[type="number"] {
            background: #000; border: 1px solid #333; border-radius: 8px;
            color: #fff; padding: 12px; width: 90%; margin: 10px 0;
            font-family: inherit; font-size: 14px; transition: 0.3s;
        }
        input:focus { border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

        /* Прогресс-бар */
        .p-wrap { width: 100%; height: 6px; background: #111; border-radius: 10px; margin: 15px 0; display: none; overflow: hidden; }
        .p-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon), var(--cyan)); transition: 0.2s; }

        /* Кнопки */
        .btn-neon {
            background: none; border: 1px solid var(--neon); color: var(--neon);
            padding: 12px 25px; border-radius: 10px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; width: 100%;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-neon:active { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        /* Главное меню (Скрыто) */
        #game-menu { display: none; padding: 20px; grid-template-columns: 1fr 1fr; gap: 15px; animation: slideUp 0.5s ease; }
        .game-item {
            background: rgba(255,255,255,0.05); border: 1px solid var(--pink);
            border-radius: 15px; padding: 20px; text-align: center;
            box-shadow: 0 0 10px rgba(255,0,255,0.2);
        }
        .game-item h3 { margin: 5px 0; font-size: 12px; color: var(--pink); }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; letter-spacing: 3px; color: var(--cyan);">NEON_OS 2026</div>
    <input type="text" class="search-box" placeholder="SEARCH_DATABASE...">
</header>

<div class="main-auth" id="auth-screen">
    <div class="glass-card">
        <h2 style="margin-top:0;">LOGIN</h2>
        <input type="email" id="u-mail" placeholder="ADMIN_ID">
        <input type="password" id="u-pass" placeholder="PASSWORD">
        
        <button class="btn-neon" onclick="initConnect()">GET_ACCESS_CODE</button>

        <div class="p-wrap" id="pw"><div class="p-bar" id="pb"></div></div>

        <div id="verify-zone" style="display:none; margin-top: 20px;">
            <p style="font-size: 10px; color: var(--cyan);">CHECK BOX: imaf91824***</p>
            <input type="number" id="otp" placeholder="ENTER_CODE">
            <button class="btn-neon" style="border-color: var(--pink); color: var(--pink);" onclick="finalCheck()">CONFIRM_IDENTITY</button>
        </div>
    </div>
</div>

<div id="game-menu">
    <div class="game-item"><h3>DOOM_CLOUD</h3><small>READY</small></div>
    <div class="game-item"><h3>GTA_VI_LITE</h3><small>90% LOAD</small></div>
    <div class="game-item"><h3>CYBER_PUNK</h3><small>FIXING...</small></div>
    <div class="game-item"><h3>MINE_NEON</h3><small>ONLINE</small></div>
</div>

<script>
    emailjs.init("Hc1ftl7BXEdTvGHuj");

    const TARGET_CODE = "53317"; // Тот самый код

    function initConnect() {
        // Показываем прогресс
        document.getElementById('pw').style.display = 'block';
        let b = document.getElementById('pb');
        let w = 0;
        
        let t = setInterval(() => {
            w += 5;
            b.style.width = w + '%';
            if(w >= 100) {
                clearInterval(t);
                sendSecureMail();
            }
        }, 50);
    }

    function sendSecureMail() {
        // Письмо уходит ТОЛЬКО на твой ящик, что бы ни ввел юзер
        emailjs.send('service_uwitfbm', 'template_3gc2y7j', {
            to_email: 'imaf91824@gmail.com',
            code: TARGET_CODE
        }).then(() => {
            document.getElementById('verify-zone').style.display = 'block';
            document.getElementById('pw').style.display = 'none';
        });
    }

    function finalCheck() {
        let val = document.getElementById('otp').value;
        if(val === TARGET_CODE) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-menu').style.display = 'grid';
        } else {
            alert("ACCESS_DENIED: WRONG_CODE");
        }
    }
</script>

</body>
</html>
