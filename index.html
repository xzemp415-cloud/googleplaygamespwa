<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Neon Games </title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --neon: #00ff41; --pink: #ff00ff; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        header { border-bottom: 2px solid var(--neon); padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #000; box-shadow: 0 0 15px var(--neon); }
        .search-input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 5px 15px; border-radius: 20px; outline: none; width: 120px; }

        .auth-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .neon-card { border: 2px solid var(--neon); padding: 30px; border-radius: 15px; box-shadow: 0 0 25px var(--neon); text-align: center; width: 280px; background: #000; }
        
        .progress-box { width: 100%; height: 10px; background: #111; margin: 20px 0; display: none; border-radius: 5px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--pink); box-shadow: 0 0 15px var(--pink); transition: 0.2s; }

        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin: 8px 0; width: 90%; font-family: inherit; font-size: 16px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        button:active { background: #008f11; }

        #dashboard { display: none; padding: 20px; grid-template-columns: 1fr 1fr; gap: 15px; animation: fadeIn 0.5s; }
        .menu-item { border: 1px solid var(--pink); padding: 20px; text-align: center; box-shadow: 0 0 10px var(--pink); font-size: 14px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div style="font-size: 18px; font-weight: bold;">NEON_CLOUD</div>
    <input type="text" class="search-input" placeholder="SEARCH...">
</header>

<div class="auth-wrapper" id="login-screen">
    <div class="neon-card">
        <h2 style="color: var(--pink); margin: 0 0 15px 0;">SYSTEM_LOGIN</h2>
        <input type="email" id="user-email" placeholder="LOGIN">
        <input type="password" id="user-pass" placeholder="PASSWORD">
        
        <button onclick="startLoading()">CONNECT</button>

        <div class="progress-box" id="p-box"><div class="progress-fill" id="p-fill"></div></div>

        <div id="otp-input-block" style="display:none; margin-top: 20px;">
            <p style="font-size: 11px; color: var(--pink);">CHECK EMAIL: 53317 SENT</p>
            <input type="number" id="otp-code-input" placeholder="ENTER 53317">
            <button onclick="checkOTP()">CONFIRM</button>
        </div>
    </div>
</div>

<div id="dashboard">
    <div class="menu-item">🕹️ GAMES</div>
    <div class="menu-item">💾 CLOUD</div>
    <div class="menu-item">🔧 CONFIG</div>
    <div class="menu-item">👤 PROFILE</div>
</div>

<script>
    emailjs.init("Hc1ftl7BXEdTvGHuj"); 

    // ЖЕСТКО ФИКСИРУЕМ КОД, ЧТОБЫ НЕ БЫЛО ОШИБОК
    const FIXED_CODE = "53317";

    function startLoading() {
        document.getElementById('p-box').style.display = 'block';
        let fill = document.getElementById('p-fill');
        let val = 0;
        let loader = setInterval(() => {
            val += 20;
            fill.style.width = val + '%';
            if(val >= 100) {
                clearInterval(loader);
                sendFixedEmail();
            }
        }, 100);
    }

    function sendFixedEmail() {
        emailjs.send('service_uwitfbm', 'template_3gc2y7j', {
            to_email: 'imaf91824@gmail.com',
            code: FIXED_CODE // Шлем именно этот код
        }).then(() => {
            document.getElementById('otp-input-block').style.display = 'block';
            document.getElementById('p-box').style.display = 'none';
        });
    }

    function checkOTP() {
        const userVal = document.getElementById('otp-code-input').value.trim();
        
        // Теперь сверяем с нашим фиксированным кодом
        if(userVal === FIXED_CODE) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
        } else {
            alert("❌ ОШИБКА: Код " + userVal + " не подходит!");
        }
    }
</script>

</body>
</html>
